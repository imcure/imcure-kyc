<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMCure – KYC Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --gold:#F6C200;--gold-dark:#d4a900;--black:#1A1A1A;
      --gray:#6B7280;--border:#E5E7EB;--white:#fff;
      --red:#EF4444;--green:#16A34A;--blue:#2563EB;
      --radius:12px;--font:'DM Sans',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font);background:#F0F2F5;color:var(--black);min-height:100vh;}
    .admin-header{background:var(--black);color:var(--white);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold);}
    .admin-header h1{font-size:20px;font-weight:700;}
    .admin-header h1 span{color:var(--gold);}
    .header-right{display:flex;align-items:center;gap:12px;}
    .admin-email{font-size:13px;color:#aaa;}
    #btnLogout{background:#333;color:var(--white);border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;transition:0.2s;}
    #btnLogout:hover{background:var(--red);}
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .login-box{width:100%;max-width:380px;background:var(--white);border-radius:20px;padding:40px 32px;box-shadow:0 8px 32px rgba(0,0,0,0.12);text-align:center;}
    .login-logo svg{height:48px;width:auto;margin-bottom:8px;}
    .login-box h2{font-size:22px;font-weight:700;margin-bottom:4px;}
    .login-box p{color:var(--gray);font-size:13px;margin-bottom:28px;}
    .form-group{margin-bottom:16px;text-align:left;}
    .form-label{display:block;font-size:13px;font-weight:600;color:var(--black);margin-bottom:6px;}
    .form-input{width:100%;padding:13px 15px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:15px;outline:none;transition:0.2s;}
    .form-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(246,194,0,0.15);}
    .btn-login{width:100%;background:var(--gold);border:none;border-radius:var(--radius);padding:14px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;color:var(--black);transition:0.2s;margin-top:4px;}
    .btn-login:hover{background:var(--gold-dark);}
    .login-err{color:var(--red);font-size:13px;margin-top:10px;font-weight:500;min-height:20px;}
    .admin-wrap{max-width:1100px;margin:0 auto;padding:28px 20px;}
    .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px;}
    .stat-card{background:var(--white);border-radius:var(--radius);padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
    .stat-label{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--gray);margin-bottom:6px;letter-spacing:0.05em;}
    .stat-value{font-size:28px;font-weight:700;}
    .stat-value.gold{color:var(--gold-dark);}
    .stat-value.green{color:var(--green);}
    .stat-value.red{color:var(--red);}
    .search-bar{background:var(--white);border-radius:var(--radius);padding:12px 16px;display:flex;gap:10px;align-items:center;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
    .search-bar input{flex:1;border:none;outline:none;font-family:var(--font);font-size:14px;}
    .table-wrap{background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
    .table-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .table-head h3{font-size:15px;font-weight:700;}
    #refreshBtn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:7px 14px;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;}
    #refreshBtn:hover{border-color:var(--gold);background:#FFFBEB;}
    table{width:100%;border-collapse:collapse;}
    th{background:#F9FAFB;text-align:left;padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--gray);letter-spacing:0.05em;}
    td{padding:13px 16px;font-size:13px;border-top:1px solid var(--border);vertical-align:middle;}
    tr:hover td{background:#FAFAFA;}
    .kyc-ref{font-family:monospace;font-size:11px;color:var(--blue);font-weight:600;}
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;}
    .badge.pending{background:#FEF3C7;color:#92400E;}
    .badge.verified{background:#DCFCE7;color:var(--green);}
    .badge.rejected{background:#FEE2E2;color:var(--red);}
    .action-btns{display:flex;gap:6px;}
    .btn-status{background:none;border:1.5px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font);transition:0.15s;}
    .btn-status.approve:hover{border-color:var(--green);background:#DCFCE7;color:var(--green);}
    .btn-status.reject:hover{border-color:var(--red);background:#FEE2E2;color:var(--red);}
    .file-link{color:var(--blue);text-decoration:none;font-size:12px;}
    .file-link:hover{text-decoration:underline;}
    .empty-state{text-align:center;padding:48px 20px;color:var(--gray);font-size:14px;}
    .loading-state{text-align:center;padding:40px;color:var(--gray);}
    @media(max-width:640px){
      .admin-wrap{padding:16px 12px;}
      td:nth-child(4),th:nth-child(4){display:none;}
    }
  </style>
</head>
<body>

<header class="admin-header" id="adminHeader" style="display:none">
  <h1><span>IMCure</span> KYC Admin</h1>
  <div class="header-right">
    <span class="admin-email">support@imcure.in</span>
    <button id="btnLogout" onclick="logout()">Logout</button>
  </div>
</header>

<!-- Login -->
<div class="login-wrap" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <svg viewBox="0 0 140 60" xmlns="http://www.w3.org/2000/svg">
        <path d="M45 10 Q70 32 95 10" stroke="#F6C200" stroke-width="5" fill="none" stroke-linecap="round"/>
        <ellipse cx="44" cy="9" rx="3.5" ry="2.5" fill="#F6C200"/>
        <ellipse cx="96" cy="9" rx="3.5" ry="2.5" fill="#F6C200"/>
        <circle cx="20" cy="28" r="4" fill="#F6C200"/>
        <text x="14" y="48" font-family="DM Sans,sans-serif" font-weight="700" font-size="22" fill="#1A1A1A">imcure</text>
      </svg>
    </div>
    <h2>Admin Panel</h2>
    <p>Enter your admin password to view KYC submissions.</p>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="adminPassword"
             placeholder="Enter admin password"
             onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <button class="btn-login" onclick="doLogin()">Login →</button>
    <p class="login-err" id="loginErr"></p>
  </div>
</div>

<!-- Admin Panel -->
<div id="adminPanel" style="display:none">
  <div class="admin-wrap">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value gold" id="statTotal">—</div></div>
      <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value" id="statPending">—</div></div>
      <div class="stat-card"><div class="stat-label">Verified</div><div class="stat-value green" id="statVerified">—</div></div>
      <div class="stat-card"><div class="stat-label">Rejected</div><div class="stat-value red" id="statRejected">—</div></div>
    </div>
    <div class="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search by name, phone, or KYC ID…" oninput="filterTable()" />
    </div>
    <div class="table-wrap">
      <div class="table-head">
        <h3>KYC Submissions</h3>
        <button id="refreshBtn" onclick="loadSubmissions()">⟳ Refresh</button>
      </div>
      <div id="tableContent"><div class="loading-state">Loading…</div></div>
    </div>
  </div>
</div>

<script src="js/firebase-config.js"></script>
<script>
  // SHA-1 hash of "Imcure@123"
  const ADMIN_HASH = '7c4a8d09ca3762af61e59520943dc26494f8941b';

  let allSubmissions = [];

  window.addEventListener('load', () => {
    if (sessionStorage.getItem('imcure_admin') === 'true') showPanel();
  });

  async function doLogin() {
    const pwd = document.getElementById('adminPassword').value;
    document.getElementById('loginErr').textContent = '';
    if (!pwd) { document.getElementById('loginErr').textContent = 'Please enter your password.'; return; }
    const hash = await sha1(pwd);
    if (hash === ADMIN_HASH) {
      sessionStorage.setItem('imcure_admin', 'true');
      showPanel();
    } else {
      document.getElementById('loginErr').textContent = 'Incorrect password. Please try again.';
      document.getElementById('adminPassword').value = '';
    }
  }

  function logout() {
    sessionStorage.removeItem('imcure_admin');
    document.getElementById('adminPanel').style.display  = 'none';
    document.getElementById('adminHeader').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminPassword').value = '';
  }

  function showPanel() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display  = 'block';
    document.getElementById('adminHeader').style.display = 'flex';
    loadSubmissions();
  }

  async function sha1(str) {
    const buf = await crypto.subtle.digest('SHA-1', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function loadSubmissions() {
    document.getElementById('tableContent').innerHTML = '<div class="loading-state">Loading…</div>';
    try {
      const snap = await db.collection('kyc_submissions').orderBy('timestamp','desc').limit(200).get();
      allSubmissions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      updateStats();
      renderTable(allSubmissions);
    } catch(err) {
      document.getElementById('tableContent').innerHTML = `<div class="empty-state">Error: ${err.message}</div>`;
    }
  }

  function updateStats() {
    document.getElementById('statTotal').textContent    = allSubmissions.length;
    document.getElementById('statPending').textContent  = allSubmissions.filter(s=>s.status==='pending').length;
    document.getElementById('statVerified').textContent = allSubmissions.filter(s=>s.status==='verified').length;
    document.getElementById('statRejected').textContent = allSubmissions.filter(s=>s.status==='rejected').length;
  }

  function renderTable(list) {
    if (!list.length) {
      document.getElementById('tableContent').innerHTML = '<div class="empty-state">No KYC submissions yet.</div>';
      return;
    }
    const rows = list.map(s => {
      const ts   = s.timestamp?.toDate?.() || new Date();
      const date = ts.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
      const time = ts.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
      return `<tr>
        <td><span class="kyc-ref">${esc(s.kycId||'—')}</span></td>
        <td><strong>${esc(s.name||'—')}</strong></td>
        <td>${esc(s.phone||'—')}</td>
        <td>${date} ${time}</td>
        <td><span class="badge ${s.status||'pending'}">${s.status||'pending'}</span></td>
        <td>
          ${s.idDriveLink    ? `<a class="file-link" href="${s.idDriveLink}"    target="_blank">📄 ID</a>`    : '—'}
          &nbsp;
          ${s.videoDriveLink ? `<a class="file-link" href="${s.videoDriveLink}" target="_blank">🎥 Video</a>` : '—'}
        </td>
        <td><div class="action-btns">
          <button class="btn-status approve" onclick="updateStatus('${s.kycId}','verified')">✓ Approve</button>
          <button class="btn-status reject"  onclick="updateStatus('${s.kycId}','rejected')">✕ Reject</button>
        </div></td>
      </tr>`;
    }).join('');
    document.getElementById('tableContent').innerHTML = `
      <table>
        <thead><tr><th>KYC ID</th><th>Name</th><th>Phone</th><th>Date/Time</th><th>Status</th><th>Files</th><th>Actions</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderTable(allSubmissions.filter(s=>
      (s.name||'').toLowerCase().includes(q)||
      (s.phone||'').toLowerCase().includes(q)||
      (s.kycId||'').toLowerCase().includes(q)
    ));
  }

  async function updateStatus(kycId, status) {
    try {
      await db.collection('kyc_submissions').doc(kycId)
        .update({status, reviewedAt: firebase.firestore.FieldValue.serverTimestamp()});
      const i = allSubmissions.findIndex(s=>s.kycId===kycId);
      if (i!==-1) allSubmissions[i].status = status;
      updateStats(); filterTable();
    } catch(err) { alert(`Failed: ${err.message}`); }
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
