<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>IMCure — KYC Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{--gold:#F6C200;--gd:#C49A00;--gf:rgba(246,194,0,0.06);--gl:rgba(246,194,0,0.2);--ink:#090909;--s1:#111;--s2:#181818;--s3:#202020;--s4:#2A2A2A;--ln:rgba(255,255,255,0.07);--t1:#EFEFEF;--t2:#909090;--t3:#505050;--red:#FF4D4D;--rf:rgba(255,77,77,0.08);--green:#22C55E;--grf:rgba(34,197,94,0.08);--blue:#60A5FA;--r:12px;--fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--fb);background:var(--ink);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased;}
.hidden{display:none!important;}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{width:100%;max-width:370px;background:var(--s1);border:1px solid var(--ln);border-radius:28px;padding:38px 30px;text-align:center;position:relative;overflow:hidden;}
.login-box::before{content:'';position:absolute;top:0;left:18%;right:18%;height:1px;background:linear-gradient(90deg,transparent,var(--gd),transparent);opacity:0.5;}
.login-logo{display:block;width:min(170px,52vw);height:auto;margin:0 auto 18px;mix-blend-mode:screen;filter:invert(1) drop-shadow(0 0 14px rgba(246,194,0,0.2));}
.login-title{font-family:var(--fh);font-size:20px;font-weight:700;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--t2);margin-bottom:26px;}
.field{margin-bottom:15px;text-align:left;}
.flabel{display:block;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--t3);margin-bottom:7px;}
.finput{width:100%;background:var(--s3);border:1.5px solid var(--ln);border-radius:var(--r);padding:13px 15px;font-family:var(--fb);font-size:15px;color:var(--t1);outline:none;transition:all 0.18s;-webkit-appearance:none;}
.finput:focus{border-color:var(--gd);box-shadow:0 0 0 3px rgba(246,194,0,0.12);background:var(--s2);}
.finput::placeholder{color:var(--t3);}
.btn{display:flex;align-items:center;justify-content:center;width:100%;padding:14px;border:none;border-radius:var(--r);font-family:var(--fb);font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-gold{background:var(--gold);color:var(--ink);}
.btn-gold:hover{background:#FFD84D;transform:translateY(-1px);}
.btn-gold:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.login-err{font-size:13px;color:var(--red);margin-top:12px;min-height:18px;line-height:1.4;}
.hdr{background:rgba(9,9,9,0.9);border-bottom:1px solid var(--ln);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);}
.hdr-logo{height:30px;width:auto;mix-blend-mode:screen;filter:invert(1) drop-shadow(0 0 6px rgba(246,194,0,0.15));}
.hdr-r{display:flex;align-items:center;gap:12px;}
.hdr-em{font-size:12px;color:var(--t3);}
.btn-lo{background:none;border:1px solid var(--ln);border-radius:999px;color:var(--t3);font-family:var(--fb);font-size:12px;font-weight:500;padding:5px 12px;cursor:pointer;transition:all 0.18s;}
.btn-lo:hover{border-color:var(--red);color:var(--red);}
.body{max-width:1100px;margin:0 auto;padding:26px 20px 60px;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:11px;margin-bottom:22px;}
.stat{background:var(--s1);border:1px solid var(--ln);border-radius:16px;padding:16px 18px;}
.slb{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--t3);margin-bottom:7px;}
.sv{font-family:var(--fh);font-size:26px;font-weight:700;}
.sv.gold{color:var(--gd);}.sv.green{color:var(--green);}.sv.red{color:var(--red);}
.srch{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:10px 15px;display:flex;align-items:center;gap:9px;margin-bottom:18px;}
.srch input{flex:1;background:none;border:none;outline:none;font-family:var(--fb);font-size:14px;color:var(--t1);}
.srch input::placeholder{color:var(--t3);}
.tcard{background:var(--s1);border:1px solid var(--ln);border-radius:16px;overflow:hidden;}
.ttop{padding:13px 19px;border-bottom:1px solid var(--ln);display:flex;align-items:center;justify-content:space-between;}
.ttitle{font-family:var(--fh);font-size:14px;font-weight:700;}
.btn-ref{background:none;border:1px solid var(--ln);border-radius:var(--r);color:var(--t2);font-family:var(--fb);font-size:12px;font-weight:600;padding:5px 12px;cursor:pointer;transition:all 0.18s;}
.btn-ref:hover{border-color:var(--gl);color:var(--gold);}
.twrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{background:var(--s2);text-align:left;padding:10px 15px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--t3);white-space:nowrap;}
td{padding:13px 15px;font-size:13px;border-top:1px solid var(--ln);vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,0.018);}
.kid{font-family:monospace;font-size:11px;color:var(--blue);font-weight:600;}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;}
.badge.pending{background:rgba(246,194,0,0.1);color:var(--gd);border:1px solid rgba(246,194,0,0.2);}
.badge.verified{background:var(--grf);color:var(--green);border:1px solid rgba(34,197,94,0.2);}
.badge.rejected{background:var(--rf);color:var(--red);border:1px solid rgba(255,77,77,0.2);}
.acts{display:flex;gap:5px;}
.ab{background:none;border:1px solid var(--ln);border-radius:6px;padding:4px 9px;font-size:12px;font-weight:600;font-family:var(--fb);cursor:pointer;color:var(--t2);transition:all 0.15s;white-space:nowrap;}
.ab.ap:hover{border-color:var(--green);color:var(--green);background:var(--grf);}
.ab.rj:hover{border-color:var(--red);color:var(--red);background:var(--rf);}
.fl{color:var(--blue);text-decoration:none;font-size:12px;}
.fl:hover{text-decoration:underline;}
.empty{text-align:center;padding:48px;color:var(--t3);font-size:14px;}
.load{text-align:center;padding:40px;color:var(--t3);}
@media(max-width:640px){.body{padding:14px 13px 40px;}td:nth-child(4),th:nth-child(4){display:none;}}
</style>
</head>

  try {
    const buf  = await crypto.subtle.digest('SHA-1', new TextEncoder().encode(pwd));
    const hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    if (hash === HASH) { sessionStorage.setItem('imcure_ok','1'); showPanel(); }
    else { err.textContent = 'Incorrect password. Please try again.'; document.getElementById('pwdIn').value=''; }
  } catch(e) { err.textContent = 'Error. Please try again.'; }
  btn.disabled = false; btn.textContent = 'Login →';
}

function doLogout() {
  sessionStorage.removeItem('imcure_ok');
  document.getElementById('adminScr').classList.add('hidden');
  document.getElementById('loginScr').style.display = 'flex';
  document.getElementById('pwdIn').value = '';
}

function showPanel() {
  document.getElementById('loginScr').style.display = 'none';
  document.getElementById('adminScr').classList.remove('hidden');
  loadData();
}

async function loadData() {
  document.getElementById('tw').innerHTML = '<div class="load">Loading…</div>';
  try {
    const snap = await db.collection('kyc_submissions').orderBy('timestamp','desc').limit(200).get();
    all = snap.docs.map(d => Object.assign({id: d.id}, d.data()));
    updateStats(); render(all);
  } catch(e) { document.getElementById('tw').innerHTML='<div class="empty">Error: '+e.message+'</div>'; }
}

function updateStats() {
  document.getElementById('sT').textContent = all.length;
  document.getElementById('sP').textContent = all.filter(s=>s.status==='pending').length;
  document.getElementById('sV').textContent = all.filter(s=>s.status==='verified').length;
  document.getElementById('sR').textContent = all.filter(s=>s.status==='rejected').length;
}

function render(rows) {
  if (!rows.length) { document.getElementById('tw').innerHTML='<div class="empty">No submissions yet.</div>'; return; }
  let html = '';
  rows.forEach(function(s) {
    const ts   = s.timestamp && s.timestamp.toDate ? s.timestamp.toDate() : new Date();
    const date = ts.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
    const time = ts.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    const id   = x(s.kycId||'—');
    const nm   = x(s.name||'—');
    const ph   = x(s.phone||'—');
    const st   = s.status||'pending';
    const idLnk = (s.idDriveLink && s.idDriveLink !== 'upload_failed') ? '<a class="fl" href="'+s.idDriveLink+'" target="_blank">📄 ID</a>' : '—';
    html += '<tr><td><span class="kid">'+id+'</span></td><td><strong>'+nm+'</strong></td><td>'+ph+'</td><td>'+date+' '+time+'</td><td><span class="badge '+st+'">'+st+'</span></td><td>'+idLnk+'</td><td><div class="acts"><button class="ab ap" onclick="setS(''+s.kycId+'','verified')">✓ Approve</button><button class="ab rj" onclick="setS(''+s.kycId+'','rejected')">✕ Reject</button></div></td></tr>';
  });
  document.getElementById('tw').innerHTML='<div class="twrap"><table><thead><tr><th>KYC ID</th><th>Name</th><th>Phone</th><th>Date/Time</th><th>Status</th><th>Files</th><th>Actions</th></tr></thead><tbody>'+html+'</tbody></table></div>';
}

function filt(q) {
  q = q.toLowerCase();
  render(all.filter(function(s){ return (s.name||'').toLowerCase().includes(q)||(s.phone||'').toLowerCase().includes(q)||(s.kycId||'').toLowerCase().includes(q); }));
}

async function setS(kycId, status) {
  try {
    await db.collection('kyc_submissions').doc(kycId).update({status: status, reviewedAt: firebase.firestore.FieldValue.serverTimestamp()});
    const i = all.findIndex(function(s){ return s.kycId === kycId; });
    if (i !== -1) all[i].status = status;
    updateStats(); filt('');
  } catch(e) { alert('Failed: '+e.message); }
}

function x(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

</script>
